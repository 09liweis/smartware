<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerHouse Industrial Lighting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      padding: 40px;
    }
    
    .og-container {
      width: 1200px;
      height: 630px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
    }
    
    .og-left {
      flex: 1;
      background: linear-gradient(135deg, #1e40af 0%, #1e293b 100%);
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .og-right {
      flex: 1;
      background: #f8fafc;
      padding: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .og-logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    .og-logo span:first-child {
      color: #60a5fa;
    }
    
    .og-logo span:last-child {
      color: white;
    }
    
    .og-tagline {
      font-size: 24px;
      color: #cbd5e1;
      margin-bottom: 40px;
      max-width: 400px;
    }
    
    .og-features {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .og-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      color: #e2e8f0;
    }
    
    .og-feature svg {
      width: 20px;
      height: 20px;
      color: #60a5fa;
    }
    
    .og-icon {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .og-icon svg {
      width: 100px;
      height: 100px;
    }
    
    .og-url {
      position: absolute;
      bottom: 40px;
      right: 40px;
      color: #64748b;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <div class="og-left">
      <div class="og-logo">
        <span>POWER</span><span>HOUSE</span>
      </div>
      <div class="og-tagline">
        Industrial LED Lighting Solutions
      </div>
      <div class="og-features">
        <div class="og-feature">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          <span>Factory-Direct Pricing</span>
        </div>
        <div class="og-feature">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          <span>North American Support</span>
        </div>
        <div class="og-feature">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          <span>Shenzhen Manufacturing</span>
        </div>
      </div>
    </div>
    <div class="og-right">
      <div class="og-icon">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" />
        </svg>
      </div>
    </div>
    <div class="og-url">powerhouse-lighting.com</div>
  </div>
</body>
</html>
